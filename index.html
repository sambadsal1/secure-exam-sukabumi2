<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>🔒 Secure Exam Sukabumi 2 | Anti-Cheat Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b2b26;
            font-family: 'Segoe UI', system-ui;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .app-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0b2b26, #0a1c1a);
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #0f2c27;
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #2e7d64;
            flex-shrink: 0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background: white;
            border-radius: 50%;
            padding: 4px;
        }
        .title {
            color: #f0fdf4;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .badge {
            background: #1e3a37;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.65rem;
            color: #9cd4c2;
        }
        .panel {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }
        .card {
            background: rgba(15, 35, 32, 0.9);
            border-radius: 1.2rem;
            padding: 1.2rem;
            border: 1px solid #2e7d64;
            margin-bottom: 1rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background: #0a1f1c;
            border: 1.5px solid #2e7d64;
            border-radius: 1rem;
            color: #e2f0ec;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        input[type="password"] {
            letter-spacing: 0.2rem;
        }
        button {
            background: linear-gradient(95deg, #1f6e5c, #0f3b34);
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-outline {
            background: #2e7d64;
        }
        .warning {
            background: #2d2a1e;
            border-left: 4px solid #f4b942;
            padding: 0.6rem;
            border-radius: 0.8rem;
            font-size: 0.7rem;
            color: #ffe5b4;
            margin-top: 0.8rem;
        }
        .success-warning {
            background: #1e4a3a;
            border-left-color: #2ecc71;
        }
        .generated-link {
            background: #0a1f1c;
            padding: 0.6rem;
            border-radius: 0.8rem;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.7rem;
            margin-top: 0.8rem;
            color: #7ee0c0;
        }
        .hidden { display: none; }
        
        /* ========== LAYAR KUNCI YANG MENUTUP TOTAL ========== */
        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(15px);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 1rem;
            cursor: default;
            pointer-events: auto;
        }
        /* Mencegah interaksi dengan elemen di belakang layar kunci */
        .lock-overlay ~ * {
            pointer-events: none;
        }
        .lock-card {
            background: #1e1e2a;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 2px solid #f97316;
            box-shadow: 0 0 50px rgba(249, 115, 22, 0.3);
            animation: pulse 1.5s infinite;
            pointer-events: auto;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        .lock-card h2 {
            color: #ffb347;
            margin: 1rem 0;
            font-size: 1.5rem;
        }
        .lock-card p {
            color: #ccc;
            font-size: 0.85rem;
            margin: 0.5rem 0;
        }
        .lock-card input {
            background: #0f172a;
            border: 1px solid #f97316;
            color: white;
            text-align: center;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .lock-card button {
            background: linear-gradient(95deg, #f97316, #dc2626);
            margin-top: 1rem;
        }
        
        .exam-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .exam-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        .exam-mode .panel {
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .exam-mode #studentExamArea {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 0;
            margin: 0;
        }
        
        @media (max-width: 700px) {
            .title { font-size: 0.85rem; }
            .logo-img { width: 35px; height: 35px; }
        }
        
        .qr-info {
            background: #1e3a37;
            padding: 0.5rem;
            border-radius: 0.5rem;
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.7rem;
        }
        
        .test-mode-btn {
            background: #5a3a1e;
            margin-top: 0.5rem;
            font-size: 0.7rem;
        }
        
        /* BANNED SECTION - menutup total juga */
        .banned-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.99);
            backdrop-filter: blur(20px);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 1rem;
            pointer-events: auto;
        }
        .banned-card {
            background: #1e1e2a;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 2px solid #ef4444;
        }
        .banned-card h2 {
            color: #ef4444;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div class="header">
        <div class="logo-area">
            <img id="schoolLogo" class="logo-img" src="logo-sekolah.png" alt="Logo" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2245%22%20fill%3D%22%232e7d64%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2268%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2240%22%3E🏫%3C%2Ftext%3E%3C%2Fsvg%3E'">
            <div class="title">SECURE EXAM<br><span style="font-size:0.6rem;">SUKABUMI 2</span></div>
        </div>
        <div class="badge" id="modeBadge">🔐 MODE GURU</div>
    </div>
    <div class="panel" id="mainPanel">
        <div id="guruSection">
            <div class="card">
                <h3 style="color:#e2f0ec; font-size:1rem;">📥 Masukkan Link Google Form</h3>
                <input type="url" id="formLinkInput" placeholder="https://docs.google.com/forms/d/e/...">
                <div style="margin-top: 0.5rem;">
                    <input type="password" id="guruPasswordInput" placeholder="Password Guru" style="margin-top: 0;">
                </div>
                <button id="generateBtn">🔒 GENERATE LINK UJIAN AMAN</button>
                <div id="generatedResult" class="hidden">
                    <div style="margin-top: 1rem;">
                        <label style="color:#9cd4c2;">✅ LINK UJIAN AMAN:</label>
                        <div class="generated-link" id="secureLinkDisplay"></div>
                        <button id="copyLinkBtn" class="btn-outline" style="margin-top: 0.5rem;">📋 Salin Link</button>
                        <button id="testLinkBtn" class="test-mode-btn" style="margin-top: 0.5rem;">🔍 Uji Coba Link</button>
                    </div>
                    <div class="qr-info">
                        📱 Gunakan link di ATAS untuk membuat QR Code.
                    </div>
                </div>
            </div>
        </div>

        <div id="studentExamArea" class="hidden">
            <div class="exam-wrapper" id="examWrapper">
                <iframe id="examIframe" class="exam-iframe" sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-popups"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================= KONFIGURASI =======================
    const MASTER_PASSWORD = "r4h4514";
    const ENCRYPTION_KEY = "Sukabumi2Secure2025";
    const STORAGE_BAN_KEY = "secure_exam_banned";
    const STORAGE_BAN_REASON_KEY = "secure_exam_ban_reason";
    
    let currentMode = "guru";
    let examLocked = false;
    let studentExamActive = false;
    let lastBlurTime = 0;
    let fullscreenCheckInterval;
    let originalWindowWidth = window.innerWidth;
    let originalWindowHeight = window.innerHeight;
    
    // DOM
    const guruSection = document.getElementById('guruSection');
    const studentExamArea = document.getElementById('studentExamArea');
    const examIframe = document.getElementById('examIframe');
    const modeBadge = document.getElementById('modeBadge');
    const generateBtn = document.getElementById('generateBtn');
    const formLinkInput = document.getElementById('formLinkInput');
    const guruPasswordInput = document.getElementById('guruPasswordInput');
    const generatedResult = document.getElementById('generatedResult');
    const secureLinkDisplay = document.getElementById('secureLinkDisplay');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const testLinkBtn = document.getElementById('testLinkBtn');
    const appContainer = document.getElementById('app');
    
    // ======================= FUNGSI BAN PERMANEN =======================
    function checkBanStatus() {
        const banned = localStorage.getItem(STORAGE_BAN_KEY);
        if (banned === 'true') {
            const reason = localStorage.getItem(STORAGE_BAN_REASON_KEY) || "Pelanggaran keamanan";
            showBannedScreen(reason);
            return true;
        }
        return false;
    }
    
    function setBan(reason) {
        localStorage.setItem(STORAGE_BAN_KEY, 'true');
        localStorage.setItem(STORAGE_BAN_REASON_KEY, reason);
        showBannedScreen(reason);
    }
    
    function clearBan() {
        localStorage.removeItem(STORAGE_BAN_KEY);
        localStorage.removeItem(STORAGE_BAN_REASON_KEY);
        window.location.reload();
    }
    
    function showBannedScreen(reason) {
        // Hentikan semua aktivitas ujian
        if (studentExamActive) {
            studentExamActive = false;
            examLocked = true;
        }
        if (fullscreenCheckInterval) clearInterval(fullscreenCheckInterval);
        
        // Hapus overlay yang mungkin sudah ada
        const existingOverlay = document.getElementById('bannedOverlay');
        if (existingOverlay) existingOverlay.remove();
        
        // Buat overlay yang menutup TOTAL layar
        const overlay = document.createElement('div');
        overlay.id = 'bannedOverlay';
        overlay.className = 'banned-overlay';
        overlay.innerHTML = `
            <div class="banned-card">
                <span style="font-size: 3rem;">🚫🔒</span>
                <h2>PERANGKAT TERKUNCI!</h2>
                <p style="color: #ccc; margin: 1rem 0;">
                    Perangkat ini telah terdeteksi melakukan pelanggaran:<br>
                    <strong style="color: #f97316;">${reason}</strong>
                </p>
                <p style="color: #aaa; font-size: 0.8rem;">
                    Ujian tidak dapat diakses dari perangkat ini.<br>
                    Hubungi guru untuk membuka kunci.
                </p>
                <input type="password" id="bannedUnlockPassword" placeholder="Password Guru" style="margin-top: 1rem;">
                <button id="bannedUnlockBtn">🔓 BUKA KUNCI PERANGKAT</button>
            </div>
        `;
        document.body.appendChild(overlay);
        
        // Event listener untuk unlock
        document.getElementById('bannedUnlockBtn').onclick = () => {
            const pwd = document.getElementById('bannedUnlockPassword').value;
            if (pwd === MASTER_PASSWORD) {
                clearBan();
            } else {
                alert("❌ Password salah!");
                document.getElementById('bannedUnlockPassword').value = "";
            }
        };
        document.getElementById('bannedUnlockPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('bannedUnlockBtn').click();
        });
    }
    
    // ======================= LAYAR KUNCI SEMENTARA (MENUTUP TOTAL) =======================
    function showLockScreen(reason) {
        // Hentikan akses ke iframe
        if (examIframe) {
            examIframe.style.pointerEvents = 'none';
        }
        
        // Hapus overlay yang mungkin sudah ada
        const existingOverlay = document.getElementById('tempLockOverlay');
        if (existingOverlay) existingOverlay.remove();
        
        // Buat overlay yang menutup TOTAL layar, tidak bisa diklik/dilewati
        const overlay = document.createElement('div');
        overlay.id = 'tempLockOverlay';
        overlay.className = 'lock-overlay';
        overlay.innerHTML = `
            <div class="lock-card">
                <span style="font-size: 3rem;">🔒⚠️</span>
                <h2>UJIAN TERKUNCI!</h2>
                <p style="color: #ccc;">
                    Pelanggaran terdeteksi:<br>
                    <strong style="color: #f97316;">${reason}</strong>
                </p>
                <p style="color: #aaa; font-size: 0.8rem; margin-top: 1rem;">
                    Perangkat ini akan diblokir.<br>
                    Hubungi guru untuk membuka kunci.
                </p>
                <div style="margin-top: 1rem; padding: 0.5rem; background: #2d2a1e; border-radius: 0.5rem;">
                    <p style="color: #ffb347; font-size: 0.7rem;">⏱️ Perangkat akan diblokir permanen dalam 3 detik...</p>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        
        // Setelah 3 detik, ban permanen
        setTimeout(() => {
            setBan(reason);
        }, 3000);
    }
    
    // ======================= FUNGSI PELANGGARAN =======================
    function triggerViolation(reason) {
        if (!studentExamActive || examLocked) return;
        
        console.warn("🔴 VIOLATION:", reason);
        examLocked = true;
        studentExamActive = false;
        
        // Hentikan interval
        if (fullscreenCheckInterval) clearInterval(fullscreenCheckInterval);
        if (document.exitFullscreen) document.exitFullscreen().catch(e=>{});
        
        // Tampilkan layar kunci (menutup total)
        showLockScreen(reason);
    }
    
    // ======================= FUNGSI ENKRIPSI =======================
    function simpleEncrypt(url) {
        try {
            let text = url + "||" + Date.now();
            let encoded = btoa(unescape(encodeURIComponent(text)));
            let reversed = encoded.split('').reverse().join('');
            let final = btoa(reversed + "::" + ENCRYPTION_KEY);
            return final;
        } catch(e) {
            console.error("Encrypt error:", e);
            return null;
        }
    }
    
    function simpleDecrypt(token) {
        try {
            let decoded = atob(token);
            let parts = decoded.split("::");
            if (parts.length !== 2 || parts[1] !== ENCRYPTION_KEY) return null;
            let reversed = parts[0].split('').reverse().join('');
            let original = decodeURIComponent(escape(atob(reversed)));
            let urlPart = original.split("||")[0];
            if (urlPart && urlPart.includes("docs.google.com/forms")) return urlPart;
            return null;
        } catch(e) { 
            console.error("Decrypt error:", e);
            return null; 
        }
    }
    
    // ======================= GENERATE LINK =======================
    function generateSecureLink(formUrl) {
        if (!formUrl || !formUrl.includes("docs.google.com/forms")) {
            alert("❌ Link harus Google Form yang valid!");
            return null;
        }
        const encrypted = simpleEncrypt(formUrl);
        if (!encrypted) return null;
        const baseUrl = window.location.href.split('?')[0].split('#')[0];
        return `${baseUrl}?exam=${encodeURIComponent(encrypted)}`;
    }
    
    // ======================= MODE GURU =======================
    generateBtn.onclick = () => {
        const pwd = guruPasswordInput.value;
        if (pwd !== MASTER_PASSWORD) {
            alert("❌ Password salah!");
            guruPasswordInput.value = "";
            guruPasswordInput.focus();
            return;
        }
        const url = formLinkInput.value.trim();
        if (!url) {
            alert("⚠️ Isi link Google Form terlebih dahulu!");
            return;
        }
        const secureLink = generateSecureLink(url);
        if (secureLink) {
            secureLinkDisplay.innerText = secureLink;
            generatedResult.classList.remove('hidden');
            generatedResult.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            guruPasswordInput.value = "";
        } else {
            alert("❌ Gagal generate link.");
        }
    };
    
    guruPasswordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') generateBtn.click();
    });
    
    copyLinkBtn.onclick = () => {
        const link = secureLinkDisplay.innerText;
        if (link && link.includes('?exam=')) {
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ Link aman disalin!");
            }).catch(() => alert("❌ Gagal menyalin"));
        } else {
            alert("❌ Generate link terlebih dahulu!");
        }
    };
    
    if (testLinkBtn) {
        testLinkBtn.onclick = () => {
            const link = secureLinkDisplay.innerText;
            if (link && link.includes('?exam=')) window.open(link, '_blank');
            else alert("❌ Generate link terlebih dahulu!");
        };
    }
    
    // ======================= DETEKSI RESIZE (ROTASI LAYAR AMAN) =======================
    function detectSplitWindow() {
        if (!studentExamActive || examLocked) return;
        const currentWidth = window.innerWidth;
        const currentHeight = window.innerHeight;
        
        const widthChange = Math.abs(currentWidth - originalWindowWidth) / originalWindowWidth;
        const heightChange = Math.abs(currentHeight - originalWindowHeight) / originalWindowHeight;
        
        // Rotasi layar (keduanya berubah signifikan) -> aman, update ukuran
        if (widthChange > 0.3 && heightChange > 0.3) {
            originalWindowWidth = currentWidth;
            originalWindowHeight = currentHeight;
            return;
        }
        
        // Split screen: satu dimensi berubah drastis, dimensi lain hampir tidak berubah
        if ((widthChange > 0.3 && heightChange < 0.1) || (heightChange > 0.3 && widthChange < 0.1)) {
            triggerViolation("Split screen / multi window terdeteksi");
        } else if (widthChange > 0.5 || heightChange > 0.5) {
            triggerViolation("Perubahan resolusi ekstrim terdeteksi");
        }
        
        originalWindowWidth = currentWidth;
        originalWindowHeight = currentHeight;
    }
    
    // ======================= PROTEKSI SISWA =======================
    function startStudentProtection() {
        originalWindowWidth = window.innerWidth;
        originalWindowHeight = window.innerHeight;
        
        // Blokir semua event copy/paste/contextmenu
        const blockEvents = ['copy', 'cut', 'paste', 'contextmenu', 'dragstart', 'selectstart'];
        blockEvents.forEach(ev => {
            document.addEventListener(ev, (e) => {
                if (studentExamActive && !examLocked) {
                    e.preventDefault();
                    triggerViolation(`Percobaan ${ev}`);
                }
            });
        });
        
        // Blokir shortcut berbahaya
        window.addEventListener('keydown', (e) => {
            if (!studentExamActive || examLocked) return;
            const dangerous = ['F12', 'F5', 'Home', 'End', 'c', 'C', 'p', 'P', 's', 'S', 'u', 'U'];
            if ((e.ctrlKey && dangerous.includes(e.key)) ||
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) ||
                e.key === 'F12' || e.key === 'F5') {
                e.preventDefault();
                triggerViolation(`Shortcut ilegal (${e.key})`);
            }
            if (e.key === 'Escape') e.preventDefault();
        });
        
        // Deteksi keluar tab
        setInterval(() => {
            if (!studentExamActive || examLocked) return;
            if (document.hidden) triggerViolation("Pindah tab / buka aplikasi lain");
            if (!document.hasFocus()) triggerViolation("Kehilangan fokus");
        }, 300);
        
        // Deteksi screenshot via blur+focus
        window.addEventListener('blur', () => { if (studentExamActive && !examLocked) lastBlurTime = Date.now(); });
        window.addEventListener('focus', () => {
            if (studentExamActive && !examLocked && lastBlurTime > 0) {
                const duration = Date.now() - lastBlurTime;
                if (duration > 50 && duration < 800) triggerViolation("Terdeteksi screenshot");
            }
        });
        
        // Deteksi resize (split window)
        window.addEventListener('resize', () => {
            if (studentExamActive && !examLocked) detectSplitWindow();
        });
        
        window.addEventListener('beforeprint', () => triggerViolation("Percobaan print"));
        window.addEventListener('beforeunload', (e) => {
            if (studentExamActive && !examLocked) {
                e.preventDefault();
                triggerViolation("Mencoba keluar halaman");
            }
        });
        
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', () => {
            if (studentExamActive && !examLocked) {
                history.pushState(null, null, location.href);
                triggerViolation("Tombol back ditekan");
            }
        });
        
        forceFullscreenKiosk();
    }
    
    function forceFullscreenKiosk() {
        const elem = document.documentElement;
        const requestFS = elem.requestFullscreen || elem.webkitRequestFullscreen || elem.msRequestFullscreen;
        if (requestFS) requestFS.call(elem).catch(e => console.log("Fullscreen perlu interaksi"));
        
        const fsHandler = () => {
            if (studentExamActive && !examLocked) {
                const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
                if (!isFS) triggerViolation("Keluar dari mode fullscreen");
            }
        };
        document.addEventListener('fullscreenchange', fsHandler);
        document.addEventListener('webkitfullscreenchange', fsHandler);
        
        fullscreenCheckInterval = setInterval(() => {
            if (!studentExamActive || examLocked) { clearInterval(fullscreenCheckInterval); return; }
            const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (!isFS && !examLocked) requestFS?.call(elem).catch(e => {});
        }, 2000);
    }
    
    // ======================= MEMUAT UJIAN SISWA =======================
    function loadStudentExam(encryptedToken) {
        if (checkBanStatus()) return false;
        
        const originalUrl = simpleDecrypt(encryptedToken);
        if (!originalUrl) {
            alert("❌ Link ujian tidak valid!");
            window.location.href = window.location.pathname;
            return false;
        }
        
        studentExamActive = true;
        examLocked = false;
        
        guruSection.classList.add('hidden');
        studentExamArea.classList.remove('hidden');
        modeBadge.innerText = "🎓 UJIAN AKTIF | LOCKDOWN MODE";
        appContainer.classList.add('exam-mode');
        
        examIframe.src = originalUrl;
        startStudentProtection();
        return true;
    }
    
    // ======================= DETEKSI PARAMETER URL =======================
    function getExamTokenFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('exam');
    }
    
    // ======================= INISIALISASI =======================
    function init() {
        if (checkBanStatus()) return;
        
        const token = getExamTokenFromURL();
        if (token) {
            currentMode = "siswa";
            loadStudentExam(token);
        } else {
            currentMode = "guru";
            guruSection.classList.remove('hidden');
            studentExamArea.classList.add('hidden');
            modeBadge.innerText = "🔐 MODE GURU (Generate Link)";
        }
    }
    
    init();
    console.log("Secure Exam Sukabumi 2 - Siap digunakan");
</script>
</body>
</html>
